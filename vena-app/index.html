<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vena</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <div class="logo-dot"></div>
        <h1 class="logo">vena</h1>
      </div>
      <button class="icon-btn" aria-label="내 페이지">👤</button>
    </header>

    <main class="main-content">
      <section class="hero-card">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Travel phrase map</p>
            <h2 class="hero-title"> 여행 언어 기록 </h2>
          </div>
          <button class="location-btn" onclick="getLocation()">📍 내 위치</button>
        </div>

        <div class="map-wrap">
          <iframe
            id="mapFrame"
            class="map"
            title="서울 지도"
            loading="lazy"
            src="https://www.google.com/maps?q=Seoul&output=embed"
          ></iframe>
        </div>
      </section>

      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="section-label">Phrases</p>
            <h3 class="section-title">상황에 맞는 추천 문장</h3>
          </div>
        </div>

        <div class="phrase-list">
          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">Where is the restroom?</p>
              <p class="phrase-ko">화장실이 어디예요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('Where is the restroom?')">기록</button>
          </div>

          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">Could I get this to go?</p>
              <p class="phrase-ko">이거 포장 가능한가요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('Could I get this to go?')">기록</button>
          </div>

          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">How much is this?</p>
              <p class="phrase-ko">이거 얼마예요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('How much is this?')">기록</button>
          </div>
        </div>
      </section>

      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="section-label">My log</p>
            <h3 class="section-title">내 로그 남기기</h3>
          </div>
        </div>

        <label class="input-label" for="logInput">오늘 사용한 문장이나 메모를 적어보세요</label>
        <textarea
          id="logInput"
          class="log-input"
          placeholder="예: Where is the restroom? / 서울역에서 급하게 물어봄"
        ></textarea>

        <button class="save-btn" onclick="saveLog()">저장하기</button>

        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab active">Map</button>
      <button class="tab">Phrases</button>
      <button class="tab">Log</button>
      <button class="tab">My</button>
    </nav>
  </div>

  <script>

let currentLat = null
let currentLng = null

function getLocation(){

if(!navigator.geolocation){
alert("위치 기능 지원 안됨")
return
}

navigator.geolocation.getCurrentPosition(function(pos){

currentLat = pos.coords.latitude
currentLng = pos.coords.longitude

document.getElementById("mapFrame").src =
"https://www.google.com/maps?q=" + currentLat + "," + currentLng + "&output=embed"

})

}

function insertSentence(sentence){

document.getElementById("logInput").value = sentence

}

function saveLog(){

let text = document.getElementById("logInput").value.trim()

if(text === ""){
alert("문장을 입력하세요")
return
}

let now = new Date()

let time =
now.getFullYear() + "." +
String(now.getMonth()+1).padStart(2,'0') + "." +
String(now.getDate()).padStart(2,'0') + " " +
String(now.getHours()).padStart(2,'0') + ":" +
String(now.getMinutes()).padStart(2,'0')

let locationText = "위치 없음"

if(currentLat && currentLng){
locationText = currentLat.toFixed(4) + ", " + currentLng.toFixed(4)
}

let logHTML = `
<div class="log-item">
<div class="log-meta">
📍 ${locationText} <br>
🕒 ${time}
</div>
<div class="log-text">
${text}
</div>
</div>
`

document.getElementById("logList").insertAdjacentHTML("afterbegin",logHTML)

document.getElementById("logInput").value=""

}

</script>
</body>
</html>
