<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vena</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <div class="logo-dot"></div>
        <h1 class="logo">vena</h1>
      </div>
      <a href="mypage.html" class="icon-btn" aria-label="내 페이지" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">👤</a>
    </header>

    <main class="main-content">
      <section class="hero-card">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Travel phrase map</p>
            <h2 class="hero-title"> 여행 언어 기록 </h2>
          </div>
          <button class="location-btn" onclick="getLocation()">📍 내 위치</button>
        </div>

        <div class="map-wrap">
          <iframe
            id="mapFrame"
            class="map"
            title="서울 지도"
            loading="lazy"
            src="https://www.google.com/maps?q=Seoul&output=embed"
          ></iframe>
        </div>
      </section>

      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="section-label">Phrases</p>
            <h3 class="section-title">상황에 맞는 추천 문장</h3>
          </div>
        </div>

        <div class="phrase-list">
          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">Where is the restroom?</p>
              <p class="phrase-ko">화장실이 어디예요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('Where is the restroom?')">기록</button>
          </div>

          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">Could I get this to go?</p>
              <p class="phrase-ko">이거 포장 가능한가요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('Could I get this to go?')">기록</button>
          </div>

          <div class="phrase-card">
            <div class="phrase-text">
              <p class="phrase-en">How much is this?</p>
              <p class="phrase-ko">이거 얼마예요?</p>
            </div>
            <button class="add-btn" onclick="insertSentence('How much is this?')">기록</button>
          </div>
        </div>
      </section>

      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="section-label">My log</p>
            <h3 class="section-title">내 로그 남기기</h3>
          </div>
        </div>

        <label class="input-label" for="logInput">오늘 사용한 문장이나 메모를 적어보세요</label>
        <textarea
          id="logInput"
          class="log-input"
          placeholder="예: Where is the restroom? / 서울역에서 급하게 물어봄"
        ></textarea>

        <button class="save-btn" onclick="saveLog()">저장하기</button>

        <div id="logList" class="log-list"></div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab active">Map</button>
      <button class="tab">Phrases</button>
      <button class="tab">Log</button>
      <button class="tab">My</button>
    </nav>
  </div>

 <script>
  let currentLat = null;
  let currentLng = null;

  // 페이지 로드 시 저장된 로그 불러오기
  window.addEventListener("DOMContentLoaded", function () {
    const saved = JSON.parse(localStorage.getItem("vena_logs") || "[]");
    saved.forEach(function (log) {
      renderLogItem(log);
    });
  });

  function getLocation() {
    if (!navigator.geolocation) {
      alert("이 브라우저에서는 위치 기능을 지원하지 않습니다.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        moveMap(currentLat, currentLng);
      },
      function () {
        alert("위치 정보를 가져올 수 없습니다.");
      }
    );
  }

  function moveMap(lat, lng) {
    document.getElementById("mapFrame").src =
      "https://www.google.com/maps?q=" + lat + "," + lng + "&output=embed";
  }

  function insertSentence(sentence) {
    document.getElementById("logInput").value = sentence;
    document.getElementById("logInput").focus();
  }

  function saveLog() {
    const input = document.getElementById("logInput");
    const text = input.value.trim();

    if (text === "") {
      alert("로그 내용을 입력해주세요.");
      return;
    }

    if (currentLat === null || currentLng === null) {
      alert("먼저 '내 위치'를 눌러 위치를 가져와주세요.");
      return;
    }

    const now = new Date();
    const dateText =
      now.getFullYear() + "." +
      String(now.getMonth() + 1).padStart(2, "0") + "." +
      String(now.getDate()).padStart(2, "0") + " " +
      String(now.getHours()).padStart(2, "0") + ":" +
      String(now.getMinutes()).padStart(2, "0");

    const logData = {
      id: Date.now(),
      date: dateText,
      lat: currentLat.toFixed(4),
      lng: currentLng.toFixed(4),
      text: text,
    };

    // localStorage에 저장
    const saved = JSON.parse(localStorage.getItem("vena_logs") || "[]");
    saved.unshift(logData);
    localStorage.setItem("vena_logs", JSON.stringify(saved));

    renderLogItem(logData, true);
    input.value = "";
  }

  function renderLogItem(log, prepend = false) {
    const logList = document.getElementById("logList");
    const logItem = document.createElement("div");
    logItem.className = "log-item";
    logItem.dataset.id = log.id;

    logItem.innerHTML = `
      <p class="log-date">🕒 ${log.date}</p>
      <p class="log-location">📍 ${log.lat}, ${log.lng}</p>
      <p class="log-content">${escapeHtml(log.text)}</p>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <button class="view-map-btn" onclick="moveMap(${log.lat}, ${log.lng})">지도에서 보기</button>
        <button class="view-map-btn" style="background:#fff0f0; color:#e05555;" onclick="deleteLog(${log.id})">삭제</button>
      </div>
    `;

    if (prepend) {
      logList.prepend(logItem);
    } else {
      logList.appendChild(logItem);
    }
  }

  function deleteLog(id) {
    // DOM에서 제거
    const el = document.querySelector(`.log-item[data-id="${id}"]`);
    if (el) el.remove();

    // localStorage에서도 제거
    const saved = JSON.parse(localStorage.getItem("vena_logs") || "[]");
    const updated = saved.filter(function (log) { return log.id !== id; });
    localStorage.setItem("vena_logs", JSON.stringify(updated));
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
