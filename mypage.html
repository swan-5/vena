<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vena — 내 페이지</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #f7f8fc 0%, #eef2ff 100%);
      font-family: "Inter", "Noto Sans KR", sans-serif;
      color: #1f2a44;
      min-height: 100vh;
    }

    button, input, textarea { font: inherit; }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f7f8fc;
      position: relative;
      padding-bottom: 40px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 10px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(31,42,68,0.08);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn:active { transform: scale(0.96); }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #5b6cff;
      box-shadow: 0 0 12px rgba(91,108,255,0.35);
    }

    .logo {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    /* Main */
    .main-content { padding: 0 16px; }

    .page-title-card {
      background: linear-gradient(135deg, #5b6cff 0%, #7f8cff 100%);
      border-radius: 24px;
      padding: 22px 20px;
      margin-bottom: 16px;
      color: #fff;
    }

    .page-eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
      margin: 0 0 6px;
    }

    .page-title {
      margin: 0 0 16px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stats-row {
      display: flex;
      gap: 12px;
    }

    .stat-box {
      background: rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* Section cards */
    .section-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 16px;
      box-shadow: 0 12px 32px rgba(31,42,68,0.08);
      margin-bottom: 16px;
    }

    .section-label {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 600;
      color: #7f8aac;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* 지도 탭 */
    .map-tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .map-tab {
      flex: 1;
      border: 2px solid #e3e8f5;
      background: #f4f6ff;
      color: #7f8aac;
      padding: 9px 6px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .map-tab.active {
      border-color: #5b6cff;
      background: #eef1ff;
      color: #4254e8;
    }

    .map-tab:active { transform: scale(0.97); }

    /* 통합 지도 */
    .map-wrap {
      overflow: hidden;
      border-radius: 20px;
    }

    .map {
      width: 100%;
      height: 280px;
      border: 0;
      display: block;
    }

    .map-hint {
      margin-top: 10px;
      font-size: 12px;
      color: #7f8aac;
      text-align: center;
    }

    /* 로그 목록 */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .log-item {
      background: #f4f6ff;
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      border: 2px solid transparent;
    }

    .log-item:active { transform: scale(0.99); }
    .log-item.active { border-color: #5b6cff; background: #eef1ff; }

    .log-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .log-content {
      font-size: 15px;
      font-weight: 600;
      color: #1f2a44;
      line-height: 1.45;
      flex: 1;
      word-break: break-word;
    }

    .log-memo {
      margin: 6px 0 0;
      font-size: 13px;
      color: #6e7896;
      line-height: 1.5;
      word-break: break-word;
      padding: 8px 12px;
      background: #eef1ff;
      border-radius: 10px;
    }

    .log-pin-btn {
      flex-shrink: 0;
      border: none;
      background: #5b6cff;
      color: #fff;
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .log-pin-btn:active { transform: scale(0.96); }

    .log-meta {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: #7f8aac;
      flex-wrap: wrap;
    }

    /* 개별 지도 패널 */
    .log-map-panel {
      display: none;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 14px;
    }

    .log-map-panel.open { display: block; }

    .log-map-panel iframe {
      width: 100%;
      height: 200px;
      border: 0;
      display: block;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #7f8aac;
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .go-home-btn {
      display: inline-block;
      margin-top: 16px;
      background: linear-gradient(135deg, #5b6cff 0%, #7f8cff 100%);
      color: #fff;
      padding: 12px 24px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="logo-wrap">
        <div class="logo-dot"></div>
        <h1 class="logo">vena</h1>
      </div>
    </header>

    <main class="main-content">

      <!-- 타이틀 + 통계 -->
      <div class="page-title-card">
        <p class="page-eyebrow">My Page</p>
        <h2 class="page-title">내 여행 기록</h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">Log</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="statLocations">0</div>
            <div class="stat-label">장소</div>
          </div>
        </div>
      </div>

      <!-- 통합 지도 -->
      <div class="section-card" id="mapCard">
        <p class="section-label">Map</p>
        <h3 class="section-title">Where I've been</h3>

        <div class="map-tab-row">
          <button class="map-tab active" onclick="setMapView('world', this)">🌍 세계지도</button>
          <button class="map-tab" onclick="setMapView('country', this)">🗺️ 내 나라</button>
          <button class="map-tab" onclick="setMapView('local', this)">📍 내 위치</button>
        </div>

        <div class="map-wrap">
          <div id="leafletMap" style="width:100%; height:280px; border-radius:20px; overflow:hidden;"></div>
        </div>
        <p class="map-hint">📍 로그를 클릭하면 해당 위치로 이동해요</p>
      </div>

      <!-- 로그 목록 -->
      <div class="section-card">
        <p class="section-label">Log</p>
        <h3 class="section-title">내 로그 목록</h3>
        <div class="log-list" id="logList"></div>
      </div>

    </main>
  </div>

  <script>
    const logs = JSON.parse(localStorage.getItem("vena_logs") || "[]");

    // 통계
    document.getElementById("statTotal").textContent = logs.length;
    const uniqueLocs = new Set(logs.map(l => l.lat + "," + l.lng)).size;
    document.getElementById("statLocations").textContent = uniqueLocs;

    // ── Leaflet 지도 초기화 ──
    const map = L.map("leafletMap", { zoomControl: true }).setView([20, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
      maxZoom: 19
    }).addTo(map);

    // 로그 마커 추가
    const markerIcon = L.divIcon({
      className: "",
      html: `<div style="width:12px;height:12px;background:#5b6cff;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(91,108,255,0.5);"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });

    logs.forEach(function(log) {
      L.marker([parseFloat(log.lat), parseFloat(log.lng)], { icon: markerIcon })
        .addTo(map)
        .bindPopup("<b>" + log.text + "</b><br><small>" + log.date + "</small>");
    });

    // 현재 위치 상태
    let userLat = null;
    let userLng = null;
    let userMarker = null;

    // 위치 가져오기
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;

        // 내 위치 마커 (파란 점)
        userMarker = L.circleMarker([userLat, userLng], {
          radius: 8,
          fillColor: "#4254e8",
          color: "#fff",
          weight: 2,
          fillOpacity: 1
        }).addTo(map).bindPopup("📍 내 현재 위치");
      });
    }

    // ── 탭 전환 ──
    function setMapView(view, btn) {
      document.querySelectorAll(".map-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      if (view === "world") {
        map.setView([20, 0], 2);

      } else if (view === "country") {
        if (userLat && userLng) {
          map.setView([userLat, userLng], 6);
        } else if (logs.length > 0) {
          map.setView([parseFloat(logs[0].lat), parseFloat(logs[0].lng)], 6);
        }

      } else if (view === "local") {
        if (userLat && userLng) {
          map.setView([userLat, userLng], 15);
          if (userMarker) userMarker.openPopup();
        } else if (logs.length > 0) {
          map.setView([parseFloat(logs[0].lat), parseFloat(logs[0].lng)], 15);
        } else {
          alert("위치 정보를 가져올 수 없어요. 브라우저 위치 권한을 확인해주세요.");
        }
      }
    }

    // ── 로그 목록 렌더링 ──
    const logList = document.getElementById("logList");
    let activeIdx = null;

    if (logs.length === 0) {
      logList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🗺️</div>
          <p>아직 저장된 로그가 없어요.<br>여행 중 문장을 기록해보세요!</p>
          <a href="index.html" class="go-home-btn">홈으로 가기</a>
        </div>
      `;
    } else {
      logs.forEach(function(log, idx) {
        const item = document.createElement("div");
        item.className = "log-item";
        item.id = "logItem_" + idx;

        item.innerHTML = `
          <div class="log-item-top">
            <p class="log-content">${escapeHtml(log.text)}</p>
            <button class="log-pin-btn" onclick="focusMap(${log.lat}, ${log.lng}, ${idx})">📍 지도</button>
          </div>
          ${log.memo ? `<p class="log-memo">📝 ${escapeHtml(log.memo)}</p>` : ""}
          <div class="log-meta" style="margin-top:8px;">
            <span>🕒 ${log.date}</span>
            <span>📍 ${log.lat}, ${log.lng}</span>
          </div>
        `;

        logList.appendChild(item);
      });
    }

    function focusMap(lat, lng, idx) {
      // 지도 이동
      map.setView([parseFloat(lat), parseFloat(lng)], 15);

      // 내 위치 탭 활성화
      document.querySelectorAll(".map-tab").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".map-tab")[2].classList.add("active");

      // 맵 카드로 스크롤
      document.getElementById("mapCard").scrollIntoView({ behavior: "smooth", block: "start" });

      // 로그 아이템 활성화 토글
      if (activeIdx !== null && activeIdx !== idx) {
        document.getElementById("logItem_" + activeIdx).classList.remove("active");
      }
      const item = document.getElementById("logItem_" + idx);
      if (activeIdx === idx) {
        item.classList.remove("active");
        activeIdx = null;
      } else {
        item.classList.add("active");
        activeIdx = idx;
      }

      // 지도 크기 재계산 (스크롤 후 타일 깨짐 방지)
      setTimeout(function() { map.invalidateSize(); }, 300);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
